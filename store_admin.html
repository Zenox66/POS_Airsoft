<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS System</title>
<link rel="stylesheet" href="style2.css">
</head>
<body>
    <div id="Sidenav" class="sidenav">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a href="admin.html">Home</a>
        <a href="inventory_admin.html">Inventory</a>
        <a href="manageEmployees.html">Employees</a>
        <a href="attendance-admin.html">Check Attendance</a>
        <a href="#" class="logoutBtn">Log Out</a>
    </div>
    <div id="main">
    <header>
        <img src="assets/Logo_alt.png" width="200px" height="200px" style="cursor: pointer;" onclick="openNav()">
        <h1>AirGunn Syndicate</h1>
        <button onclick="openCart()" style="cursor: pointer;">🛒 Cart</button>
    </header>

    <div class="container">
        <div id="listProducts" class="products"></div>

        <div id="cartPanel" class="cart">
            <a href="javascript:void(0)" class="closebtn" onclick="closeCart()">&times;</a>

            <div id="cartItems"></div>

            <div class="cart-footer">
                <h3 id="totalPrice">Total: $0.00</h3>

                <input type="number" id="cashInput" placeholder="Enter cash">
                <p id="changeOutput">Change: $0.00</p>

                <button id="checkoutBtn">Checkout</button>
            </div>
        </div>
    </div>  
</div>
<script src="scripts/sidenav.js"></script>
<script src="scripts/store.js"></script>
<script src="scripts/account.js"></script>
</body>
</html>
