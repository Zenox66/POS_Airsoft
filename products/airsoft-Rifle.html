<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untouchable Airsoft Shop</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <!-- NAVBAR -->
    <header>
        <h1>UNT<span>OUCHABLE</span></h1>
        <p>Iwai's Custom Airsoft Shop</p>
    </header>

    <!-- SHOP SECTION -->
    <section class="shop">

        <div class="card">
            <img src="https://via.placeholder.com/200x150" alt="Gun">
            <h2>Replica Handgun</h2>
            <p>High precision sidearm.</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200x150" alt="Rifle">
            <h2>Assault Rifle</h2>
            <p>Reliable and powerful.</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200x150" alt="Sniper">
            <h2>Sniper Rifle</h2>
            <p>Long range accuracy.</p>
            <button>Add to Cart</button>
        </div>

    </section>

    <!-- FOOTER -->
    <footer>
        <p>"You got guts coming here..." – Iwai</p>
    </footer>

</body>
</html>
