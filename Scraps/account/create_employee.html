<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Registration</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="Sidenav" class="sidenav">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a href="../index.html">Home</a>
        <a href="Login.html">Login</a>
        <a href="create_employee.html">Sign Up</a>
    </div>
    <div id="main">
        <form id="register_form_employee" class="container">
            <div>
                <img src="../assets/Logo.png" alt="Store Logo" width="200" height="200">
            </div>
            <h1>Create Employee</h1>
            <input type="text" id="username_input" name="Username" placeholder="Username">
            <br />
            <input type="password" id="password_input" name="Password" placeholder="Password">
            <br />
            <input type="password" id="password_Confirmation" name="Repeat Password" placeholder="Confirm Password">
            <br />
            <button type="submit">Submit</button>
        </form>
        <script src="../scripts/account.js"></script>
        <script src="../scripts/sidenav.js"></script>
    </div>    
</body>
</html>
