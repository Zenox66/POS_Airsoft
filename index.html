<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="customAlert" class="alert-box">
        <div class="alert-content">
            <h2 class="errorType"></h2>
            <p class="message"></p>
            <button id="confirmBtn">OK</button>
        </div>
    </div>
    <div id="main">
        <form id="login_form" class="container">
            <div class="image">
                <img src="../assets/Logo.png" alt="Store Logo" width="400px" height="400px">
            </div>
            <h1>Log In</h1>
            <input type="text" id="username_input" name="Username" placeholder="Username">
            <br />
            <input type="password" id="password_input" name="Password" placeholder="Password">
            <div>
                <input type="checkbox" onclick="showPassword()"><span style="font-size: 14px;"><span>Show Password</span>
            </div>
            <button type="submit">LOGIN</button>
        </form>
    </div>
    <script src="scripts/account.js"></script>   
</body>
</html>
