<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="customAlert" class="alert-box">
        <div class="alert-content">
            <h2 class="errorType"></h2>
            <p class="message"></p>
            <button id="confirmBtn">OK</button>
        </div>
    </div>
    <div id="main">
        <form id="register_form_employee" class="container">
            <div class="image">
                <img src="../assets/Logo.png" alt="Store Logo" width="400px" height="400px">
            </div>
            <h1>Create Employee</h1>
            <input type="text" id="username_input" name="Username" placeholder="Username">
            <br />
            <input type="password" id="password_input" name="Password" placeholder="Password">
            <br />
            <input type="password" id="password_Confirmation" name="Repeat Password" placeholder="Confirm Password">
            <br />
            <button type="submit">Submit</button>
            <a href="index.html">I don't have an account</a>
        </form>
        <script src="scripts/account.js"></script>
    </div>    
</body>
</html>
