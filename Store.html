<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS System</title>
<link rel="stylesheet" href="style2.css">
</head>
<body>

<header>
    <img src="assets/Logo_alt.png" width="100px" height="100px">
    <h1>AirGunn Syndicate</h1>
    <button onclick="openCart()">🛒 Cart</button>
</header>

<div class="container">
    <div id="listProducts" class="products"></div>

    <div id="cartPanel" class="cart">
        <a href="javascript:void(0)" class="closebtn" onclick="closeCart()">&times;</a>

        <div id="cartItems"></div>

        <div class="cart-footer">
            <h3 id="totalPrice">Total: $0.00</h3>

            <input type="number" id="cashInput" placeholder="Enter cash">
            <p id="changeOutput">Change: $0.00</p>

            <button id="checkoutBtn">Checkout</button>
        </div>
    </div>
</div>  

<script src="scripts/store.js"></script>
</body>
</html>
