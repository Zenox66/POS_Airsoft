<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="Sidenav" class="sidenav">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a href="admin.html">Home</a>
        <a href="store_admin.html">Menu</a>
        <a href="inventory_admin.html">Inventory</a>
        <a href="attendance-admin.html">Check Attendance</a>
    </div>

    <div id="main">
        <!-- ALERT -->
        <div id="customAlert" class="alert-box">
            <div class="alert-content">
                <h2 class="errorType"></h2>
                <p class="message"></p>
                <button id="confirmBtn">OK</button>
            </div>
        </div>
        <header>
            <img src="../assets/Logo_alt.png" width="200px" height="200px" onclick="openNav()" style="cursor: pointer;">
            <h1 style="text-align:center;">Employee Management</h1>
        </header>
        <!-- ADD EMPLOYEE -->
        <div class="add-employee" style="text-align:center; margin-bottom:20px;">
            <input type="text" id="empUsername" placeholder="Username">
            <input type="password" id="empPassword" placeholder="Password">
            <button onclick="addEmployeeUI()">Add Employee</button>
        </div>

        <hr>

        <!-- TABLE -->
        <div class="admin-container">
        <table width="100%" border="1">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="employeeTable"></tbody>
        </table>
        </div>

        <!-- EDIT MODAL -->
        <div id="editModal" style="display:none;">
            <h3>Edit Employee</h3>

            <input type="hidden" id="editOldUsername">

            <input type="text" id="editUsername" placeholder="New Username">
            <br><br>

            <button onclick="saveEdit()">Save</button>
            <button onclick="closeEdit()">Cancel</button>
        </div>
    </div>
    <script src="scripts/manage_employee.js"></script>
    <script src="scripts/sidenav.js"></script>
</body>
</html>
